<!DOCTYPE html>
<html>
<head>
    <title>Formulario de Pedido</title>
</head>
<body>
    <h1>Formulario de Pedido</h1>
    <form action="pedidos.html">
        <label>Nombre del cliente (n):</label><br>
        <input type="text" name="n"><br>
        <label>Direccion (d):</label><br>
        <input type="text" name="d"><br>
        <label>Telefono (t):</label><br>
        <input type="text" name="t"><br>
        
        <label>Seleccion de platos (p):</label><br>
        <input type="checkbox" name="p" value="1"> Opcion 1<br>
        
        <label>Cantidad (c):</label><br>
        <input type="number" name="c"><br>
        
        <input type="submit" value="Enviar Pedido">
    </form>
    <p><a href="menu.html">Regresar al Menu</a></p>
</body>
</html>
