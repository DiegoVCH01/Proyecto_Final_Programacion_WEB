<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>EcoPlato - Registro</title>
</head>

<body>

    <header>
        <img src="img/logo.png" alt="Logo EcoPlato" width="250">
        <h1>EcoPlato</h1>
        <p>Menos desperdicio, más sabor</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="menu.html">Menú</a></li>
            <li><a href="form_pedido.html">Pedido</a></li>
            <li><a href="ofertas.html">Ofertas</a></li>
            <li><a href="pedidos.html">Pedidos</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <hr>

    <main>
        <h2>Crear Cuenta</h2>
        <form action="/registro" method="post">
            <div>
                <label for="nombre">Nombre de Usuario:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <br>
            <div>
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <br>
            <div>
                <label for="new-password">Contraseña:</label>
                <input type="password" id="new-password" name="new-password" required>
            </div>
            <br>
            <div>
                <label for="confirm-password">Confirmar Contraseña:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <br>
            <button type="submit">Registrar</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </main>

    <hr>

    <footer>
        <p>Contacto: contacto@ecoplato.com</p>
        <p>Teléfono: 987654321</p>
        <p>2026 EcoPlato</p>
    </footer>

</body>

</html>
